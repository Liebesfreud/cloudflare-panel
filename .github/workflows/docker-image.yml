name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    name: Test, build, and push Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Check JavaScript syntax
        run: find src public test -name '*.js' -print -exec node --check {} \;

      - name: Run tests
        run: node --test test/**/*.test.js

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve Docker image name
        id: image
        env:
          DOCKERHUB_REPOSITORY: ${{ secrets.DOCKERHUB_REPOSITORY }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -z "${DOCKERHUB_USERNAME}" ] || [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "::warning::DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets are not configured. The workflow will build the image but skip Docker Hub push."
            echo "push=false" >> "${GITHUB_OUTPUT}"
            echo "image=local/cloudflare-preferred-panel" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          image="${DOCKERHUB_REPOSITORY}"
          if [ -z "${image}" ]; then
            image="${DOCKERHUB_USERNAME}/${GITHUB_REPOSITORY#*/}"
          fi

          image="$(printf '%s' "${image}" | tr '[:upper:]' '[:lower:]')"
          echo "image=${image}" >> "${GITHUB_OUTPUT}"
          echo "push=true" >> "${GITHUB_OUTPUT}"

      - name: Login to Docker Hub
        if: ${{ steps.image.outputs.push == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ steps.image.outputs.push == 'true' }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
