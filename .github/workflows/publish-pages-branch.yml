name: Build and Publish Pages Branch

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-pages-branch
  cancel-in-progress: true

jobs:
  build:
    name: Test and build static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Check JavaScript syntax
        run: find src public scripts test -name '*.js' -print -exec node --check {} \;

      - name: Run tests
        run: node --test test/**/*.test.js

      - name: Build GitHub Pages static output
        run: node scripts/build-pages.js _site "${GITHUB_SHA}"

      - name: Publish pages branch
        run: |
          cd _site
          git init
          git checkout -b pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy GitHub Pages"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
